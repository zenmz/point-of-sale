run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive

linters-settings:
  revive:
    rules:
      # Komentar memakai Bahasa Indonesia; package comment tidak diwajibkan.
      - name: package-comments
        disabled: true

issues:
  exclude-use-default: false
